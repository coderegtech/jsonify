name: Publish jsonify-ws to NPM

on:
  push:
    branches: [main]
    paths:
      - "packages/jsonify-ws/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org/"

      - name: Install root deps
        run: npm install

      - name: Build package
        run: |
          cd packages/jsonify-ws
          npm install
          npm run build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          cd packages/jsonify-ws
          BUMP_TYPE="${{ github.event.inputs.version || 'patch' }}"
          NEW_VERSION=$(npm version $BUMP_TYPE --no-git-tag-version)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to $NEW_VERSION ($BUMP_TYPE)"

      - name: Commit version bump
        run: |
          git add packages/jsonify-ws/package.json
          git commit -m "chore(jsonify-ws): bump to ${{ steps.version.outputs.new_version }}"
          git tag "jsonify-ws/${{ steps.version.outputs.new_version }}"
          git push origin main --tags

      - name: Publish package
        run: |
          cd packages/jsonify-ws
          npm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
